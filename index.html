<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    z-index: 2;
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    font-family: monospace;
    opacity: 0.7;
    transition: color 2s ease;
}

#rain, #snow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>
<canvas id="snow"></canvas>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<div id="debug"></div>

<script>
const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");
const debugEl = document.getElementById("debug");

let liveWeather = null;
let lastWeather = null;

// =========================
// 🧪 TEST DATA
// =========================
const testStates = [
    { name: "DEN - VEDRO", hour: 14, temperature_2m: 30, precipitation: 0, cloudcover: 10 },
    { name: "DEN - POLOJASNO", hour: 16, temperature_2m: 22, precipitation: 0, cloudcover: 50 },
    { name: "DEN - ZATAŽENO", hour: 12, temperature_2m: 8, precipitation: 0, cloudcover: 90 },

    { name: "POPRCHÁVÁ", hour: 10, temperature_2m: 12, precipitation: 0.2, cloudcover: 80 },
    { name: "PRŠÍ (18°C)", hour: 11, temperature_2m: 18, precipitation: 1.5, cloudcover: 90 },

    { name: "MLHA", hour: 7, temperature_2m: 4, precipitation: 0, cloudcover: 98 },

    { name: "SNĚŽÍ", hour: 2, temperature_2m: -2, precipitation: 0.6, cloudcover: 95 },

    { name: "NOC - JASNO", hour: 23, temperature_2m: 10, precipitation: 0, cloudcover: 10 }
];

let testIndex = 0;

// =========================
// 🌡️ JEDNOTNÁ TEPLOTNÍ LOGIKA
// =========================
function getTempText(t) {
    if (t >= 28) return "VEDRO";
    if (t >= 20) return "TEPLO";
    if (t >= 12) return "PŘÍJEMNĚ";
    if (t >= 5) return "CHLADNO";
    if (t > 0) return "ZIMA";
    return "MRZNE";
}

// =========================
// WEATHER
// =========================
async function getWeather() {
    try {
        const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
        );
        const data = await res.json();
        liveWeather = data.current;
    } catch (e) {
        console.log("fetch error", e);
    }
}

// =========================
// 🌗 DAY / NIGHT
// =========================
function updateDayNight(hour, w) {
    const isDay = hour >= 6 && hour < 20;

    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";
    el.style.color = isDay ? "#0a0a0a" : "#f5f5f5";
    debugEl.style.color = isDay ? "#666" : "#aaa";
}

// =========================
// 🧠 TEXT LOGIC (FIXED)
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    // ❄️ SNÍH
    if (t <= 0 && p > 0) {
        return "MRZNE A SNĚŽÍ";
    }

    // 🌧️ déšť (teď správně!)
    if (p >= 1.0) {
        return "JE " + getTempText(t) + " A PRŠÍ";
    }

    if (p >= 0.1) {
        return "JE " + getTempText(t) + " A POPRCHÁVÁ";
    }

    // 🌫️ mlha
    if (c > 90 && t < 8) return "JE MLHA";

    let sky =
        c >= 85 ? "ZATAŽENO" :
        c >= 65 ? "OBLAČNO" :
        c >= 45 ? "POLOJASNO" :
        "JASNO";

    return "JE " + getTempText(t) + " A " + sky;
}

// =========================
// 🎬 RENDER
// =========================
function render() {
    let w;
    let hour;

    if (TEST_MODE) {
        w = testStates[testIndex];
        hour = w.hour;

        debugEl.innerHTML =
            `<b>${w.name}</b><br>` +
            `T: ${w.temperature_2m}°C<br>` +
            `P: ${w.precipitation}<br>` +
            `C: ${w.cloudcover}`;
    } else {
        if (!liveWeather) return;
        w = liveWeather;
        hour = new Date().getHours();
    }

    lastWeather = w;

    updateDayNight(hour, w);
    el.textContent = selectText(w);

    updateRain(w);
}

// =========================
// 🌧️ RAIN
// =========================
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

let drops = [];
let raining = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function initRain() {
    if (drops.length > 0) return;

    for (let i = 0; i < 100; i++) {
        drops.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            length: Math.random() * 20 + 10,
            speed: Math.random() * 4 + 4
        });
    }
}

function updateRain(w) {
    raining = w.precipitation >= 0.1;
    if (raining) initRain();
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (raining) {
        ctx.strokeStyle = "#aaa";

        for (let d of drops) {
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x + 2, d.y + d.length);
            ctx.stroke();

            d.y += d.speed;
            if (d.y > canvas.height) d.y = -20;
        }
    }

    requestAnimationFrame(drawRain);
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") testIndex = (testIndex + 1) % testStates.length;
    if (e.key === "ArrowLeft") testIndex = (testIndex - 1 + testStates.length) % testStates.length;

    render();
});

// swipe
let startX = 0;

document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {
    if (!TEST_MODE) return;

    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 50) testIndex = (testIndex - 1 + testStates.length) % testStates.length;
    if (diff < -50) testIndex = (testIndex + 1) % testStates.length;

    render();
});

// =========================
// START
// =========================
render();
drawRain();

if (!TEST_MODE) {
    setInterval(async () => {
        await getWeather();
        render();
    }, FETCH_INTERVAL);
}
</script>
</body>
</html>
