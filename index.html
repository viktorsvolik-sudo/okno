<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
    flex-direction: column; /* 🔥 důležité */
}

/* 🔝 VENKU + TEXT jako blok */
#container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

/* 📌 stejné písmo i velikost */
.line {
    font-size: 5vw;
    font-weight: 500;
    line-height: 1.1;
}

/* 🌧️ rain */
#rain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="container">
    <div id="status" class="line">VENKU</div>
    <div id="text" class="line">NAČÍTÁM...</div>
</div>

<script>

const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");
const status = document.getElementById("status");

let isUpdating = false;
let weatherTimer = null;

// =========================
// TEST DATA
// =========================
const testStates = [
    { name: "VEDRO", temperature_2m: 30, precipitation: 0, cloudcover: 10, isDay: true },
    { name: "TEPLO POLOJASNO", temperature_2m: 22, precipitation: 0, cloudcover: 50, isDay: true },
    { name: "ZATAŽENO", temperature_2m: 8, precipitation: 0, cloudcover: 90, isDay: true },
    { name: "PRŠÍ", temperature_2m: 18, precipitation: 1.5, cloudcover: 90, isDay: true },

    { name: "NOC CHLADNO", temperature_2m: 5, precipitation: 0, cloudcover: 80, isDay: false },
];

let testIndex = 0;

// =========================
// WEATHER
// =========================
async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    return data.current;
}

// =========================
// DAY / NIGHT
// =========================
function updateDayNight(w) {
    let isDay;

    if (TEST_MODE && w && w.isDay !== undefined) {
        isDay = w.isDay;
    } else {
        const hour = new Date().getHours();
        isDay = hour >= 6 && hour < 20;
    }

    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";

    const color = isDay ? "#0a0a0a" : "#f5f5f5";

    el.style.color = color;
    status.style.color = color;
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 1.0) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky = "";
    if (c >= 85) sky = "ZATAŽENO";
    else if (c >= 65) sky = "OBLAČNO";
    else if (c >= 45) sky = "POLOJASNO";
    else sky = "JASNO";

    let temp = "";
    if (t >= 28) temp = "VEDRO";
    else if (t >= 20) temp = "TEPLO";
    else if (t >= 12) temp = "PŘÍJEMNĚ";
    else if (t >= 5) temp = "CHLADNO";
    else temp = "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// LOOP
// =========================
async function runCycle() {
    if (isUpdating) return;
    isUpdating = true;

    let weather;
    let name = "";

    if (TEST_MODE) {
        weather = testStates[testIndex];
        name = weather.name;
    } else {
        weather = await getWeather();
    }

    updateDayNight(weather);

    status.textContent = "VENKU";   // 🔥 FIXNÍ
    el.textContent = selectText(weather);

    isUpdating = false;

    weatherTimer = setTimeout(runCycle, FETCH_INTERVAL);
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") {
        testIndex = (testIndex + 1) % testStates.length;
        runCycle();
    }

    if (e.key === "ArrowLeft") {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
        runCycle();
    }
});

// =========================
// START
// =========================
runCycle();

</script>

</body>
</html>
