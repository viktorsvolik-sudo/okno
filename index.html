<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
}
</style>
</head>

<body>

<div id="text">NAČÍTÁM...</div>

<script>

const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");

let testIndex = 0;
let timer = null;

// =========================
// TEST DATA
// =========================
const testStates = [
    { temperature_2m: 30, precipitation: 0, cloudcover: 10, isDay: true },
    { temperature_2m: 22, precipitation: 0, cloudcover: 50, isDay: true },
    { temperature_2m: 8, precipitation: 0, cloudcover: 90, isDay: true },
    { temperature_2m: 18, precipitation: 1.5, cloudcover: 90, isDay: true },
    { temperature_2m: 5, precipitation: 0, cloudcover: 80, isDay: false }
];

// =========================
// WEATHER
// =========================
async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    return data.current;
}

// =========================
// DAY / NIGHT
// =========================
function updateDayNight(w) {
    let isDay;

    if (TEST_MODE && w && w.isDay !== undefined) {
        isDay = w.isDay;
    } else {
        const hour = new Date().getHours();
        isDay = hour >= 6 && hour < 20;
    }

    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";
    el.style.color = isDay ? "#0a0a0a" : "#f5f5f5";
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 1.0) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky = "";
    if (c >= 85) sky = "ZATAŽENO";
    else if (c >= 65) sky = "OBLAČNO";
    else if (c >= 45) sky = "POLOJASNO";
    else sky = "JASNO";

    let temp = "";
    if (t >= 28) temp = "VEDRO";
    else if (t >= 20) temp = "TEPLO";
    else if (t >= 12) temp = "PŘÍJEMNĚ";
    else if (t >= 5) temp = "CHLADNO";
    else temp = "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// MAIN LOOP (FIXED)
// =========================
async function run() {

    let w;

    if (TEST_MODE) {
        w = testStates[testIndex];
    } else {
        w = await getWeather();
    }

    updateDayNight(w);

    // 🔥 FIX: VENKU vždy na začátku řádku
    el.textContent = "VENKU " + selectText(w);

    clearTimeout(timer);
    timer = setTimeout(run, FETCH_INTERVAL);
}

// =========================
// CONTROLS (TEST MODE)
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") {
        testIndex = (testIndex + 1) % testStates.length;
        run();
    }

    if (e.key === "ArrowLeft") {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
        run();
    }
});

// =========================
// START
// =========================
run();

</script>

</body>
</html>
