<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

/* 🌫️ MLHA = blur overlay */
#fog {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 2;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    z-index: 3;
    position: relative;
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    font-family: monospace;
    opacity: 0.7;
    z-index: 4;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>
<canvas id="snow"></canvas>

<div id="fog"></div>

<div id="text">NAČÍTÁM...</div>
<div id="debug"></div>

<script>

const TEST_MODE = true;

const el = document.getElementById("text");
const debugEl = document.getElementById("debug");
const fogEl = document.getElementById("fog");

// =========================
// TEST DATA
// =========================
const testStates = [
    { name: "DEN - VEDRO", hour: 14, temperature_2m: 30, precipitation: 0, cloudcover: 10, debug: "jasno" },
    { name: "DEN - POLOJASNO", hour: 16, temperature_2m: 22, precipitation: 0, cloudcover: 50, debug: "polojasno" },
    { name: "DEN - ZATAŽENO", hour: 12, temperature_2m: 8, precipitation: 0, cloudcover: 90, debug: "zataženo" },
    { name: "PRŠÍ", hour: 11, temperature_2m: 18, precipitation: 1.5, cloudcover: 90, debug: "déšť" },

    { name: "MLHA", hour: 7, temperature_2m: 4, precipitation: 0, cloudcover: 98, debug: "mlha (blur)" },

    { name: "SNĚŽÍ", hour: 2, temperature_2m: -2, precipitation: 0.6, cloudcover: 95, debug: "sníh" }
];

let testIndex = 0;

// =========================
// DAY/NIGHT
// =========================
function updateDayNight(hour) {
    const isDay = hour >= 6 && hour < 20;
    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";
    el.style.color = isDay ? "#0a0a0a" : "#f5f5f5";
    debugEl.style.color = isDay ? "#555" : "#aaa";
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {

    const t = w.temperature_2m;
    const p = w.precipitation;

    // ❄️ SNÍH
    if (t <= 0 && p > 0) return "MRZNE A SNĚŽÍ";

    if (p >= 1.0) return "JE CHLADNO A PRŠÍ";
    if (p >= 0.1) return "JE CHLADNO A POPRCHÁVÁ";

    return "JE OK";
}

// =========================
// FOG LOGIC (ONLY VISUAL)
// =========================
function updateFog(w) {
    const fog = w.cloudcover >= 95 && w.precipitation === 0;

    fogEl.style.opacity = fog ? "1" : "0";
}

// =========================
// RENDER
// =========================
function render() {

    const w = testStates[testIndex];
    const hour = w.hour;

    updateDayNight(hour);

    el.innerHTML = "VENKU " + selectText(w);

    debugEl.innerHTML = `
        <b>${w.name}</b><br>
        T: ${w.temperature_2m}°C<br>
        P: ${w.precipitation}<br>
        C: ${w.cloudcover}<br>
        ${w.debug}
    `;

    updateRain(w);
    updateSnow(w);
    updateFog(w);
}

// =========================
// RAIN
// =========================
const rainCanvas = document.getElementById("rain");
const rctx = rainCanvas.getContext("2d");

function resize() {
    rainCanvas.width = window.innerWidth;
    rainCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let rainDrops = [];

function initRain(intensity = 1) {
    rainDrops = [];
    for (let i = 0; i < 80 * intensity; i++) {
        rainDrops.push({
            x: Math.random() * rainCanvas.width,
            y: Math.random() * rainCanvas.height,
            s: Math.random() * 4 + 2
        });
    }
}

function updateRain(w) {

    if (w.temperature_2m <= 0 && w.precipitation > 0) return;

    if (w.precipitation >= 1) initRain(1);
    else if (w.precipitation >= 0.1) initRain(0.4);
}

function drawRain() {
    rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

    rctx.strokeStyle = "#999";
    rctx.lineWidth = 1;

    for (let d of rainDrops) {
        rctx.beginPath();
        rctx.moveTo(d.x, d.y);
        rctx.lineTo(d.x, d.y + 10);
        rctx.stroke();

        d.y += d.s;
        if (d.y > rainCanvas.height) d.y = 0;
    }

    requestAnimationFrame(drawRain);
}

// =========================
// SNOW
// =========================
const snowCanvas = document.getElementById("snow");
const sctx = snowCanvas.getContext("2d");

let snow = [];

function resizeSnow() {
    snowCanvas.width = window.innerWidth;
    snowCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeSnow);
resizeSnow();

function initSnow() {
    snow = [];
    for (let i = 0; i < 60; i++) {
        snow.push({
            x: Math.random() * snowCanvas.width,
            y: Math.random() * snowCanvas.height,
            r: Math.random() * 2 + 1,
            s: Math.random() * 1 + 0.3
        });
    }
}

function updateSnow(w) {
    if (w.temperature_2m <= 0 && w.precipitation > 0) {
        if (snow.length === 0) initSnow();
    } else {
        snow = [];
    }
}

function drawSnow() {

    sctx.clearRect(0,0,snowCanvas.width,snowCanvas.height);

    for (let f of snow) {
        sctx.fillStyle = "#fff";
        sctx.beginPath();
        sctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
        sctx.fill();

        f.y += f.s;
        if (f.y > snowCanvas.height) f.y = 0;
    }

    requestAnimationFrame(drawSnow);
}

// =========================
// CONTROLS
// =========================
document.addEventListener("click", () => {
    if (!TEST_MODE) return;
    testIndex = (testIndex + 1) % testStates.length;
    render();
});

// =========================
// START
// =========================
render();
drawRain();
drawSnow();

</script>

</body>
</html>
