<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 1.5s ease, color 1.5s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
}
</style>
</head>

<body>

<div id="text">NAČÍTÁM...</div>

<script>

// =========================
// CONFIG
// =========================
const LAT = 50.107109;
const LON = 14.447331;

const TEST_MODE = true;
const FETCH_INTERVAL = 60000;

const el = document.getElementById("text");

// =========================
// STATE
// =========================
let testIndex = 0;
let liveWeather = null;

// =========================
// TEST DATA (100% VALID)
// =========================
const testStates = [
    { temperature_2m: 30, precipitation: 0, cloudcover: 10 },
    { temperature_2m: 22, precipitation: 0, cloudcover: 50 },
    { temperature_2m: 8,  precipitation: 0, cloudcover: 90 },
    { temperature_2m: 18, precipitation: 0.2, cloudcover: 80 },
    { temperature_2m: 5,  precipitation: 1.2, cloudcover: 95 }
];

// =========================
// WEATHER FETCH
// =========================
async function fetchWeather() {
    try {
        const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
        );
        const data = await res.json();
        liveWeather = data.current;
    } catch (e) {
        console.log("weather error", e);
    }
}

// =========================
// TEXT ENGINE
// =========================
function getText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    // rain logic
    if (p >= 1.0) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky =
        c >= 85 ? "ZATAŽENO" :
        c >= 65 ? "OBLAČNO" :
        c >= 45 ? "POLOJASNO" :
        "JASNO";

    let temp =
        t >= 28 ? "VEDRO" :
        t >= 20 ? "TEPLO" :
        t >= 12 ? "PŘÍJEMNĚ" :
        t >= 5  ? "CHLADNO" :
        "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// RENDER (ONE SOURCE OF TRUTH)
// =========================
function render() {

    let w;

    if (TEST_MODE) {
        w = testStates[testIndex];
    } else {
        w = liveWeather;
    }

    if (!w) {
        el.textContent = "NAČÍTÁM...";
        return;
    }

    el.textContent = "VENKU JE " + getText(w);
}

// =========================
// LIVE LOOP
// =========================
async function loop() {
    if (!TEST_MODE) {
        await fetchWeather();
        render();
    }

    setTimeout(loop, FETCH_INTERVAL);
}

// =========================
// TEST CONTROLS (FIXED)
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") {
        testIndex = (testIndex + 1) % testStates.length;
        render();
    }

    if (e.key === "ArrowLeft") {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
        render();
    }
});

// =========================
// START
// =========================
(async function start() {

    if (TEST_MODE) {
        render(); // immediate test render
    } else {
        await fetchWeather();
        render();
        loop();
    }

})();

</script>

</body>
</html>
