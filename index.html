<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
 body {
    margin: 0;
    background: white;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    transition: color 2s ease;
}
</style>
</head>

<body>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<script>
const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 40000;
const HLEDIM_DURATION = 10000;

async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    return data.current;
}

// 🌗 DEN / NOC
function updateDayNight() {
    const now = new Date().toLocaleString("en-US", { timeZone: "Europe/Prague" });
    const hour = new Date(now).getHours();

    const isDay = hour >= 6 && hour < 20;

    if (isDay) {
        document.body.style.background = "#f5f5f5";
        document.body.style.color = "#0a0a0a";
        el.style.color = "#0a0a0a";
    } else {
        document.body.style.background = "#0a0a0a";
        document.body.style.color = "#f5f5f5";
        el.style.color = "#f5f5f5";
    }
}

// 🌦️ TEXT LOGIKA
function selectText(w) {
    if (!w) return "CHYBA POČASÍ";

    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    // 🌧️ déšť + teplota
    if (p >= 0.3) {
        return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    }

    if (p > 0.05) {
        return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";
    }

    // ❄️ sníh
    if (t <= 0 && c > 60 && p > 0) return "SNĚŽÍ";

    // 🌫️ mlha
    if (c > 90 && t < 8) return "JE MLHA";

    // ☁️ obloha
    let sky = "";

    if (c >= 85) sky = "ZATAŽENO";
    else if (c >= 65) sky = "OBLAČNO";
    else if (c >= 45) sky = "POLOJASNO";
    else if (c >= 20) sky = "MÍRNĚ OBLAČNO";
    else sky = "JASNO";

    // 🌡️ teplota
    let temp = "";

    if (t >= 28) temp = "VEDRO";
    else if (t >= 20) temp = "TEPLO";
    else if (t >= 12) temp = "PŘÍJEMNĚ";
    else if (t >= 5) temp = "CHLADNO";
    else if (t > 0) temp = "VELMI CHLADNO";
    else return "MRZNE";

    return "JE " + temp + " A " + sky;
}

const el = document.getElementById("text");

// 🔁 CYKLUS
async function showWeather() {
    updateDayNight();

    const weather = await getWeather();
    el.textContent = selectText(weather);

    setTimeout(showHledim, FETCH_INTERVAL - HLEDIM_DURATION);
}

function showHledim() {
    updateDayNight();

    el.textContent = "VENKU";
    setTimeout(showWeather, HLEDIM_DURATION);
}

showWeather();
</script>
</body>
</html>
