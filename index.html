<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    transition: color 2s ease;
    z-index: 2;
}

/* 🌧️ rain layer */
#rain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<script>
const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 40000;
const HLEDIM_DURATION = 10000;

const el = document.getElementById("text");

// =========================
// WEATHER
// =========================
async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    return data.current;
}

// =========================
// 🌗 DAY / NIGHT
// =========================
function updateDayNight() {
    const now = new Date().toLocaleString("en-US", { timeZone: "Europe/Prague" });
    const hour = new Date(now).getHours();

    const isDay = hour >= 6 && hour < 20;

    if (isDay) {
        document.body.style.background = "#f5f5f5";
        document.body.style.color = "#0a0a0a";
        el.style.color = "#0a0a0a";
    } else {
        document.body.style.background = "#0a0a0a";
        document.body.style.color = "#f5f5f5";
        el.style.color = "#f5f5f5";
    }
}

// =========================
// 🌦️ TEXT LOGIC
// =========================
function selectText(w) {
    if (!w) return "CHYBA POČASÍ";

    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 0.3) {
        return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    }

    if (p > 0.05) {
        return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";
    }

    if (t <= 0 && c > 60 && p > 0) return "SNĚŽÍ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky = "";

    if (c >= 85) sky = "ZATAŽENO";
    else if (c >= 65) sky = "OBLAČNO";
    else if (c >= 45) sky = "POLOJASNO";
    else if (c >= 20) sky = "MÍRNĚ OBLAČNO";
    else sky = "JASNO";

    let temp = "";

    if (t >= 28) temp = "VEDRO";
    else if (t >= 20) temp = "TEPLO";
    else if (t >= 12) temp = "PŘÍJEMNĚ";
    else if (t >= 5) temp = "CHLADNO";
    else if (t > 0) temp = "VELMI CHLADNO";
    else return "MRZNE";

    return "JE " + temp + " A " + sky;
}

// =========================
// 🌧️ RAIN ANIMATION
// =========================
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

let drops = [];
let raining = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function createRain() {
    drops = [];
    for (let i = 0; i < 80; i++) { // jemnější déšť
        drops.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            length: Math.random() * 20 + 10,
            speed: Math.random() * 4 + 4
        });
    }
}

function drawRain() {
    if (!raining) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = document.body.style.background === "rgb(10, 10, 10)" ? "#f5f5f5" : "#0a0a0a";
    ctx.lineWidth = 1;

    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + 2, d.y + d.length); // mírný vítr
        ctx.stroke();

        d.y += d.speed;

        if (d.y > canvas.height) {
            d.y = -20;
            d.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(drawRain);
}

// =========================
// 🔁 LOOP
// =========================
async function showWeather() {
    updateDayNight();

    const weather = await getWeather();
    const text = selectText(weather);

    el.textContent = text;

    if (text.includes("PRŠÍ")) {
        raining = true;
        createRain();
        drawRain();
    } else {
        raining = false;
    }

    setTimeout(showHledim, FETCH_INTERVAL - HLEDIM_DURATION);
}

function showHledim() {
    updateDayNight();

    el.textContent = "VENKU";
    raining = false;

    setTimeout(showWeather, HLEDIM_DURATION);
}

showWeather();
</script>
</body>
</html>
