<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 1.5s ease, color 1.5s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
}
</style>
</head>

<body>

<div id="text">NAČÍTÁM...</div>

<script>

const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");

let testIndex = 0;
let liveWeather = null;

// =========================
// TEST STATES
// =========================
const testStates = [
    { temperature_2m: 30, precipitation: 0, cloudcover: 10 },
    { temperature_2m: 22, precipitation: 0, cloudcover: 50 },
    { temperature_2m: 8, precipitation: 0, cloudcover: 90 },
    { temperature_2m: 18, precipitation: 0.3, cloudcover: 80 },
    { temperature_2m: 5, precipitation: 1.2, cloudcover: 95 }
];

// =========================
// FETCH WEATHER
// =========================
async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    liveWeather = data.current;
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 1.0) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return "JE " + (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky =
        c >= 85 ? "ZATAŽENO" :
        c >= 65 ? "OBLAČNO" :
        c >= 45 ? "POLOJASNO" :
        "JASNO";

    let temp =
        t >= 28 ? "VEDRO" :
        t >= 20 ? "TEPLO" :
        t >= 12 ? "PŘÍJEMNĚ" :
        t >= 5 ? "CHLADNO" :
        "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// RENDER (FIXED)
// =========================
function render() {

    let w;

    if (TEST_MODE) {
        w = testStates[testIndex];
    } else {
        w = liveWeather;
        if (!w) return;
    }

    el.textContent = "VENKU JE " + selectText(w);
}

// =========================
// LOOP (ONLY LIVE MODE REFRESH)
// =========================
async function loop() {

    if (!TEST_MODE) {
        await getWeather();
        render();
    }

    setTimeout(loop, FETCH_INTERVAL);
}

// =========================
// TEST CONTROLS (NO RESTART BUG)
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") {
        testIndex = (testIndex + 1) % testStates.length;
        render();
    }

    if (e.key === "ArrowLeft") {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
        render();
    }
});

// =========================
// START
// =========================
if (TEST_MODE) {
    render();
} else {
    loop();
}

</script>

</body>
</html>
