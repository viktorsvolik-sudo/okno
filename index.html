<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
    overflow: hidden;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    z-index: 3;
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    font-family: monospace;
    opacity: 0.7;
    z-index: 4;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* vrstvy */
#rain { z-index: 1; }
#snow { z-index: 1; }
#fog  { z-index: 2; }
</style>
</head>

<body>

<canvas id="rain"></canvas>
<canvas id="snow"></canvas>
<canvas id="fog"></canvas>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<div id="debug"></div>

<script>
const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");
const debugEl = document.getElementById("debug");

// =========================
// TEST DATA
// =========================
const testStates = [
    { name: "DEN - VEDRO", hour: 14, temperature_2m: 30, precipitation: 0, cloudcover: 10, debug: "VEDRO" },
    { name: "DEN - POLOJASNO", hour: 16, temperature_2m: 22, precipitation: 0, cloudcover: 50, debug: "POLOJASNO" },
    { name: "DEN - ZATAŽENO", hour: 12, temperature_2m: 8, precipitation: 0, cloudcover: 90, debug: "ZATAŽENO" },
    { name: "DEN - POPRCHÁVÁ", hour: 10, temperature_2m: 12, precipitation: 0.2, cloudcover: 80, debug: "POPRCHÁVÁ" },
    { name: "DEN - PRŠÍ", hour: 11, temperature_2m: 18, precipitation: 1.5, cloudcover: 90, debug: "PRŠÍ" },
    { name: "MLHA", hour: 7, temperature_2m: 6, precipitation: 0, cloudcover: 95, debug: "MLHA" },
    { name: "SNĚŽÍ", hour: 2, temperature_2m: -2, precipitation: 0.6, cloudcover: 95, debug: "SNÍH" },
    { name: "NOC - JASNO", hour: 23, temperature_2m: 10, precipitation: 0, cloudcover: 10, debug: "NOC JASNO" }
];

let testIndex = 0;
let liveWeather = null;

// =========================
// WEATHER
// =========================
async function getWeather() {
    try {
        const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
        );
        const data = await res.json();
        liveWeather = data.current;
    } catch (e) {
        liveWeather = null;
    }
}

// =========================
// DAY / NIGHT
// =========================
function updateDayNight(hour) {
    const isDay = hour >= 6 && hour < 20;
    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";
    el.style.color = isDay ? "#0a0a0a" : "#f5f5f5";
    debugEl.style.color = isDay ? "#555" : "#aaa";
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (t <= 0 && p > 0) return "MRZNE A SNĚŽÍ";
    if (p >= 1.0) return (t >= 20 ? "TEPLO" : "CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return (t >= 20 ? "TEPLO" : "CHLADNO") + " A POPRCHÁVÁ";

    if (c > 92) return "JE MLHA";

    let sky =
        c >= 85 ? "ZATAŽENO" :
        c >= 65 ? "OBLAČNO" :
        c >= 45 ? "POLOJASNO" :
        "JASNO";

    let temp =
        t >= 28 ? "VEDRO" :
        t >= 20 ? "TEPLO" :
        t >= 12 ? "PŘÍJEMNĚ" :
        t >= 5 ? "CHLADNO" :
        "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// RENDER
// =========================
function render() {
    let w;
    let hour;

    if (TEST_MODE) {
        w = testStates[testIndex];
        hour = w.hour;

        debugEl.innerHTML = `
        <b>${w.name}</b><br>
        ${w.debug}<br>
        T: ${w.temperature_2m}°C<br>
        P: ${w.precipitation}<br>
        C: ${w.cloudcover}
        `;
    } else {
        if (!liveWeather) return;
        w = liveWeather;
        hour = new Date().getHours();
    }

    updateDayNight(hour);
    el.innerHTML = "VENKU " + selectText(w);

    updateRain(w);
    updateSnow(w);
    updateFog(w);
}

// =========================
// RAIN
// =========================
const rainCanvas = document.getElementById("rain");
const rctx = rainCanvas.getContext("2d");

let rainDrops = [];
let raining = false;

function resizeRain() {
    rainCanvas.width = innerWidth;
    rainCanvas.height = innerHeight;
}
window.addEventListener("resize", resizeRain);
resizeRain();

function initRain(i=1){
    rainDrops=[];
    for(let n=0;n<80*i;n++){
        rainDrops.push({
            x:Math.random()*rainCanvas.width,
            y:Math.random()*rainCanvas.height,
            l:Math.random()*20+10,
            s:Math.random()*4+4
        });
    }
}

function updateRain(w){
    const p=w.precipitation;
    const t=w.temperature_2m;

    if(t<=0 && p>0) return;

    if(p>=1){ raining=true; initRain(1);}
    else if(p>=0.1){ raining=true; initRain(0.4);}
    else raining=false;
}

function drawRain(){
    rctx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

    if(raining){
        rctx.strokeStyle="#aaa";
        for(let d of rainDrops){
            rctx.beginPath();
            rctx.moveTo(d.x,d.y);
            rctx.lineTo(d.x+2,d.y+d.l);
            rctx.stroke();
            d.y+=d.s;
            if(d.y>rainCanvas.height)d.y=-20;
        }
    }
    requestAnimationFrame(drawRain);
}

// =========================
// SNOW
// =========================
const snowCanvas = document.getElementById("snow");
const sctx = snowCanvas.getContext("2d");

let snow=[];
let snowing=false;

function resizeSnow(){
    snowCanvas.width=innerWidth;
    snowCanvas.height=innerHeight;
}
window.addEventListener("resize",resizeSnow);
resizeSnow();

function initSnow(){
    snow=[];
    for(let i=0;i<60;i++){
        snow.push({
            x:Math.random()*snowCanvas.width,
            y:Math.random()*snowCanvas.height,
            r:Math.random()*2+1,
            s:Math.random()*1+0.3
        });
    }
}

function updateSnow(w){
    snowing = (w.temperature_2m <= 0 && w.precipitation > 0);
    if(snowing && snow.length===0) initSnow();
}

function drawSnow(){
    sctx.clearRect(0,0,snowCanvas.width,snowCanvas.height);

    if(snowing){
        sctx.fillStyle="#fff";
        for(let f of snow){
            sctx.beginPath();
            sctx.arc(f.x,f.y,f.r,0,Math.PI*2);
            sctx.fill();
            f.y+=f.s;
            if(f.y>snowCanvas.height)f.y=-5;
        }
    }
    requestAnimationFrame(drawSnow);
}

// =========================
// FOG (NEW)
// =========================
const fogCanvas = document.getElementById("fog");
const fctx = fogCanvas.getContext("2d");

let fogActive=false;
let fogLayers=[];

function resizeFog(){
    fogCanvas.width=innerWidth;
    fogCanvas.height=innerHeight;
}
window.addEventListener("resize",resizeFog);
resizeFog();

function initFog(){
    fogLayers=[];
    for(let i=0;i<20;i++){
        fogLayers.push({
            x:Math.random()*fogCanvas.width,
            y:Math.random()*fogCanvas.height,
            r:Math.random()*200+100,
            a:Math.random()*0.08
        });
    }
}

function updateFog(w){
    fogActive = w.cloudcover > 92;
    if(fogActive && fogLayers.length===0) initFog();
}

function drawFog(){
    fctx.clearRect(0,0,fogCanvas.width,fogCanvas.height);

    if(fogActive){
        fctx.fillStyle="rgba(200,200,200,0.05)";
        for(let f of fogLayers){
            fctx.beginPath();
            fctx.arc(f.x,f.y,f.r,0,Math.PI*2);
            fctx.fill();
        }
    }

    requestAnimationFrame(drawFog);
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown",e=>{
    if(!TEST_MODE)return;
    if(e.key==="ArrowRight"){testIndex=(testIndex+1)%testStates.length;render();}
    if(e.key==="ArrowLeft"){testIndex=(testIndex-1+testStates.length)%testStates.length;render();}
});

document.addEventListener("click",e=>{
    if(!TEST_MODE)return;
    testIndex = (e.clientX>innerWidth/2)
        ? (testIndex+1)%testStates.length
        : (testIndex-1+testStates.length)%testStates.length;
    render();
});

// =========================
// START
// =========================
render();
drawRain();
drawSnow();
drawFog();

if(!TEST_MODE){
    setInterval(async()=>{
        await getWeather();
        render();
    },50000);
}
</script>

</body>
</html>
