<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
    body {
        margin: 0;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Helvetica Neue, Arial, sans-serif;
    }

    /* 🪟 OKNO */
#window {
    border: 7px solid black;
    padding: 60px 80px;
    box-sizing: border-box;

    width: 60vmin;
    height: 80vmin;

    display: flex;
    justify-content: center;
    align-items: center;
}
    /* TEXT */
    #text {
        font-size: 5vw;
        font-weight: bold;
        color: black;
        text-align: center;
    }
</style>
</head>

<body>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<script>
const LAT = 50.107109;
const LON = 14.447331
;

const FETCH_INTERVAL = 60000;
const HLEDIM_DURATION = 10000;

async function getWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();
    return data.current;
}

function selectText(w) {
    if (!w) return "CHYBA POČASÍ";

    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 0.2) return "PRŠÍ";
    if (p > 0.05 && c > 70) return "PŘECHÁZÍ DEŠŤ";
    if (p > 0.5 && c > 80) return "JE BOUŘKA";
    if (t <= 0 && c > 60 && p > 0.05) return "SNĚŽÍ";

    if (c > 90 && t < 8) return "JE MLHA";

    let sky = "";

    if (c >= 85) sky = "ZATAŽENO";
    else if (c >= 65) sky = "OBLAČNO";
    else if (c >= 45) sky = "POLOJASNO";
    else if (c >= 20) sky = "MÍRNĚ OBLAČNO";
    else sky = "JASNO";

    let temp = "";

    if (t >= 28) temp = "VEDRO";
    else if (t >= 20) temp = "TEPLO";
    else if (t >= 12) temp = "PŘÍJEMNĚ";
    else if (t >= 5) temp = "CHLADNO";
    else if (t > 0) temp = "KOSA";
    else return "MRZNE";

    return "JE " + temp + " A " + sky;
}

const el = document.getElementById("text");

async function showWeather() {
    const weather = await getWeather();
    el.textContent = selectText(weather);

    setTimeout(showHledim, FETCH_INTERVAL - HLEDIM_DURATION);
}

function showHledim() {
    el.textContent = "ZA OKNEM";
    setTimeout(showWeather, HLEDIM_DURATION);
}

showWeather();
</script>

</body>
</html>
