<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Helvetica Neue, Arial, sans-serif;
    transition: background 2s ease, color 2s ease;
}

#text {
    font-size: 5vw;
    font-weight: 500;
    text-align: center;
    z-index: 2;
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    font-family: monospace;
    opacity: 0.7;
    transition: color 2s ease;
}

#rain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="window">
    <div id="text">NAČÍTÁM...</div>
</div>

<div id="debug"></div>

<script>
const LAT = 50.107109;
const LON = 14.447331;

const FETCH_INTERVAL = 50000;
const TEST_MODE = true;

const el = document.getElementById("text");
const debugEl = document.getElementById("debug");

// =========================
// TEST DATA + DEBUG INFO
const testStates = [
    { name: "DEN - VEDRO", hour: 14, temperature_2m: 30, precipitation: 0, cloudcover: 10, debug: "t>=28 → VEDRO, jasno" },
    { name: "DEN - POLOJASNO", hour: 16, temperature_2m: 22, precipitation: 0, cloudcover: 50, debug: "t>=20 → TEPLO, c=50 → POLOJASNO" },
    { name: "DEN - ZATAŽENO", hour: 12, temperature_2m: 8, precipitation: 0, cloudcover: 90, debug: "c>=85 → ZATAŽENO, t>=5 → CHLADNO" },
    { name: "DEN - POPRCHÁVÁ", hour: 10, temperature_2m: 12, precipitation: 0.2, cloudcover: 80, debug: "p>=0.1 → POPRCHÁVÁ" },
    { name: "DEN - PRŠÍ", hour: 11, temperature_2m: 18, precipitation: 1.5, cloudcover: 90, debug: "p>=1.0 → PRŠÍ" },

    // 🌫️ MLHA
    {
        name: "MLHA",
        hour: 7,
        temperature_2m: 4,
        precipitation: 0,
        cloudcover: 98,
        debug: "c>=95 + bez srážek → MLHA"
    },

    // ❄️ SNÍH
    {
        name: "SNĚŽÍ",
        hour: 2,
        temperature_2m: -2,
        precipitation: 0.6,
        cloudcover: 95,
        debug: "t<=0 + p>0 → SNÍH"
    },

    { name: "NOC - JASNO", hour: 23, temperature_2m: 10, precipitation: 0, cloudcover: 10, debug: "noc + jasno + t>=5 → CHLADNO" },
    { name: "NOC - DEŠŤ", hour: 2, temperature_2m: 6, precipitation: 0.8, cloudcover: 95, debug: "noc + p>=0.1 → POPRCHÁVÁ" }
];
let testIndex = 0;
let liveWeather = null;

// =========================
// WEATHER
// =========================
async function getWeather() {
    try {
        const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
        );
        const data = await res.json();
        liveWeather = data.current;
    } catch (e) {
        console.error("Weather error:", e);
        liveWeather = null;
    }
}

// =========================
// DAY / NIGHT (FIXED DEBUG COLOR)
// =========================
function updateDayNight(hour) {
    const isDay = hour >= 6 && hour < 20;

    const textColor = isDay ? "#0a0a0a" : "#f5f5f5";
    const debugColor = isDay ? "#555" : "#aaa";

    document.body.style.background = isDay ? "#f5f5f5" : "#0a0a0a";
    el.style.color = textColor;
    debugEl.style.color = debugColor; // ✅ FIX
}

// =========================
// TEXT LOGIC
// =========================
function selectText(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    if (p >= 1.0) return (t >= 20 ? "JE TEPLO" : "JE CHLADNO") + " A PRŠÍ";
    if (p >= 0.1) return (t >= 20 ? "JE TEPLO" : "JE CHLADNO") + " A POPRCHÁVÁ";
    if (c > 90 && t < 8) return "JE MLHA";

    let sky =
        c >= 85 ? "ZATAŽENO" :
        c >= 65 ? "OBLAČNO" :
        c >= 45 ? "POLOJASNO" :
        "JASNO";

    let temp =
        t >= 28 ? "VEDRO" :
        t >= 20 ? "TEPLO" :
        t >= 12 ? "PŘÍJEMNĚ" :
        t >= 5 ? "CHLADNO" :
        "ZIMA";

    return "JE " + temp + " A " + sky;
}

// =========================
// RENDER
// =========================
function render() {
    let w;
    let hour;

    if (TEST_MODE) {
        w = testStates[testIndex];
        hour = w.hour;

        debugEl.innerHTML = `
        <b>${w.name}</b><br>
        T: ${w.temperature_2m}°C<br>
        P: ${w.precipitation}<br>
        C: ${w.cloudcover}<br>
        → ${w.debug}
        `;
    } else {
        if (!liveWeather) {
            el.textContent = "NAČÍTÁM...";
            return;
        }
        w = liveWeather;
        hour = new Date().getHours();

        debugEl.innerHTML = `
        LIVE<br>
        T: ${w.temperature_2m}°C<br>
        P: ${w.precipitation}<br>
        C: ${w.cloudcover}
        `;
    }

    updateDayNight(hour);
    el.innerHTML = `VENKU ${selectText(w)}`;
    updateRain(w);
}

// =========================
// RAIN
// =========================
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

let drops = [];
let raining = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function initRain(intensity = 1) {
    drops = [];

    const dropCount = Math.floor(80 * intensity); // méně kapek při slabém dešti

    for (let i = 0; i < dropCount; i++) {
        drops.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            length: (Math.random() * 20 + 10) * intensity, // kratší kapky
            speed: (Math.random() * 4 + 4) * intensity     // pomalejší pohyb
        });
    }
}

function updateRain(w) {
    const p = w.precipitation;

    if (p >= 1.0) {
        // silný déšť
        raining = true;
        initRain(1);
    } 
    else if (p >= 0.1) {
        // poprchává
        raining = true;
        initRain(0.5); // 👈 výrazně slabší
    } 
    else {
        raining = false;
    }
}
function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (raining) {
        ctx.strokeStyle =
            document.body.style.background === "rgb(10, 10, 10)"
                ? "#f5f5f5"
                : "#0a0a0a";

        ctx.lineWidth = 1;

        for (let d of drops) {
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x + 2, d.y + d.length);
            ctx.stroke();

            d.y += d.speed;

            if (d.y > canvas.height) {
                d.y = -20;
                d.x = Math.random() * canvas.width;
            }
        }
    }

    requestAnimationFrame(drawRain);
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
    if (!TEST_MODE) return;

    if (e.key === "ArrowRight") {
        testIndex = (testIndex + 1) % testStates.length;
        render();
    }

    if (e.key === "ArrowLeft") {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
        render();
    }
});

document.addEventListener("click", (e) => {
    if (!TEST_MODE) return;

    if (e.clientX > window.innerWidth / 2) {
        testIndex = (testIndex + 1) % testStates.length;
    } else {
        testIndex = (testIndex - 1 + testStates.length) % testStates.length;
    }

    render();
});

// =========================
// START
// =========================
render();
drawRain();
</script>

</body>
</html>
